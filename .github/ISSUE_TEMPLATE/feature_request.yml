name: Feature request
description: Suggest a focused improvement for cs2sign.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This keeps runtime access to `cs2.exe` read-only.
          required: true
        - label: This does not add injection, hooks, memory writes, anti-cheat bypass behavior, or gameplay automation.
          required: true
