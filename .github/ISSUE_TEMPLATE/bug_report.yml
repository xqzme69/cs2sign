name: Bug report
description: Report a reproducible cs2sign bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce it.
  - type: input
    id: version
    attributes:
      label: cs2sign version or commit
      placeholder: "v0.1.10 or commit hash"
    validations:
      required: true
  - type: input
    id: cs2-build
    attributes:
      label: CS2 build number
      placeholder: "Example: 14158"
  - type: input
    id: command
    attributes:
      label: Command
      placeholder: '.\cs2sign\x64\Release\cs2sign.exe .\signatures --dump-all --no-pause'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Local checks
      options:
        - label: I ran the latest `main` or the latest release.
        - label: I searched existing issues.
        - label: This does not request injection, hooks, memory writes, or gameplay automation.
